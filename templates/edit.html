<div class="header">Edit Student</div>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<div class="form-box">
    <h2>Update Student</h2>

    <form method="POST">
        <input type="text" name="name" value="{{s[1]}}" required>
        <input type="number" name="age" value="{{s[2]}}" required>
        <input type="text" name="course" value="{{s[3]}}" required>

        <input type="number" name="m1" value="{{s[4]}}" required>
        <input type="number" name="m2" value="{{s[5]}}" required>
        <input type="number" name="m3" value="{{s[6]}}" required>

        <button type="submit">Update Student</button>
    </form>
</div>
